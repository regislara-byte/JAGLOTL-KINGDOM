<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VAXINX — Tore Login · JAGLOTL KINGDOM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;500;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════════
       TOKENS
    ═══════════════════════════════════════════ */
    :root {
      --col-void:     #020409;
      --col-deep:     #04070f;
      --col-blue:     #20a0ff;
      --col-blue-b:   #5ec8ff;
      --col-blue-dim: #0d4a80;
      --col-lava:     #ff6a00;
      --col-gold:     #c9a227;
      --col-gold-b:   #f0c040;
      --col-text:     #c8d8ea;
      --col-dim:      rgba(180,200,220,0.45);
      --card-w:       410px;
      --r:            20px;
      --font-d:       'Cinzel Decorative', serif;
      --font-t:       'Cinzel', serif;
      --font-b:       'Crimson Pro', serif;
      --t:            0.22s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width:100%; height:100%; overflow:hidden; background:var(--col-void);
      font-family:var(--font-b); color:var(--col-text); -webkit-font-smoothing:antialiased; }
    button { border:none; cursor:pointer; font-family:inherit; }
    input  { font-family:inherit; }
    a      { color:var(--col-blue); text-decoration:none; }
    a:hover { color:var(--col-blue-b); }

    /* ═══════════════════════════════════════════
       BACKGROUND — cosmic / void / lava
    ═══════════════════════════════════════════ */
    .bg {
      position:fixed; inset:0; z-index:0;
      background: linear-gradient(180deg, #020612 0%, #030818 45%, #060c1e 100%);
    }
    /* Full-bleed crest background — jwkBG.png used as atmospheric wash */
    .bg-crest {
      position:absolute; inset:0;
      background-image: url('jwkBG.png');
      background-size: 55%;
      background-repeat: no-repeat;
      background-position: center 38%;
      opacity: 0.07;
      filter: blur(1px) saturate(1.4);
      animation: crestPulse 9s ease-in-out infinite alternate;
    }
    @keyframes crestPulse {
      0%   { opacity:0.06; transform:scale(1); }
      100% { opacity:0.12; transform:scale(1.04); }
    }
    .bg-stars {
      position:absolute; inset:0;
      background-image:
        radial-gradient(1.5px 1.5px at  8% 12%, rgba(200,220,255,.85) 0%, transparent 100%),
        radial-gradient(1px   1px   at 18% 55%, rgba(200,220,255,.5)  0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 30%  8%, rgba(200,220,255,.7)  0%, transparent 100%),
        radial-gradient(1px   1px   at 42% 72%, rgba(200,220,255,.4)  0%, transparent 100%),
        radial-gradient(1px   1px   at 55% 20%, rgba(200,220,255,.75) 0%, transparent 100%),
        radial-gradient(1px   1px   at 63% 88%, rgba(200,220,255,.35) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 72% 35%, rgba(200,220,255,.6)  0%, transparent 100%),
        radial-gradient(1px   1px   at 80% 60%, rgba(200,220,255,.5)  0%, transparent 100%),
        radial-gradient(1px   1px   at 90% 15%, rgba(200,220,255,.8)  0%, transparent 100%),
        radial-gradient(1px   1px   at 95% 78%, rgba(200,220,255,.4)  0%, transparent 100%),
        radial-gradient(1px   1px   at 14% 90%, rgba(200,220,255,.5)  0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 50% 50%, rgba(200,220,255,.3)  0%, transparent 100%),
        radial-gradient(1px   1px   at 35% 30%, rgba(180,200,255,.55) 0%, transparent 100%),
        radial-gradient(1px   1px   at 75% 92%, rgba(180,200,255,.4)  0%, transparent 100%);
      animation: starTwinkle 7s ease-in-out infinite alternate;
    }
    .bg-stars-2 {
      position:absolute; inset:0;
      background-image:
        radial-gradient(1px 1px at  5% 40%, rgba(180,200,255,.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 22% 28%, rgba(180,200,255,.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 38% 65%, rgba(180,200,255,.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 48%  5%, rgba(180,200,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 65% 75%, rgba(200,180,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 77% 20%, rgba(200,180,255,.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 92%, rgba(200,180,255,.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 45%, rgba(180,200,255,.7) 0%, transparent 100%);
      animation: starTwinkle 11s ease-in-out infinite alternate-reverse;
    }
    @keyframes starTwinkle { 0%{opacity:.55} 100%{opacity:1} }

    .bg-lava {
      position:absolute; bottom:0; left:0; right:0; height:45%;
      background:
        radial-gradient(ellipse 55% 65% at 70% 100%, rgba(255,100,0,.13) 0%, transparent 65%),
        radial-gradient(ellipse 35% 45% at 25% 100%, rgba(180,50,0,.08)  0%, transparent 60%),
        radial-gradient(ellipse 20% 30% at 50% 100%, rgba(255,140,0,.06) 0%, transparent 50%);
      animation: lavaDrift 10s ease-in-out infinite alternate;
    }
    @keyframes lavaDrift { 0%{opacity:.7; transform:scaleX(1)} 100%{opacity:1; transform:scaleX(1.06)} }

    .bg-nebula {
      position:absolute; inset:0;
      background:
        radial-gradient(ellipse 45% 28% at 12% 28%, rgba(60,20,160,.14) 0%, transparent 70%),
        radial-gradient(ellipse 38% 22% at 88% 18%, rgba(0,80,180,.12)  0%, transparent 70%);
      animation: nebulaDrift 20s ease-in-out infinite alternate;
    }
    @keyframes nebulaDrift { 0%{transform:scale(1)} 100%{transform:scale(1.06) rotate(.8deg)} }

    /* Soft vignette */
    .bg-vignette {
      position:absolute; inset:0;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(2,4,9,.92) 100%);
      pointer-events:none;
    }

    /* ═══════════════════════════════════════════
       PAGE
    ═══════════════════════════════════════════ */
    .page {
      position:relative; z-index:1;
      width:100%; height:100%;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:16px;
      animation: pageFade .7s ease both;
    }
    @keyframes pageFade { from{opacity:0} to{opacity:1} }

    /* ═══════════════════════════════════════════
       GLOWING CARD
    ═══════════════════════════════════════════ */
    .card {
      position:relative;
      width:var(--card-w); max-width:100%;
      border-radius:var(--r);
      padding:2px;
      background: linear-gradient(160deg,
        rgba(32,160,255,.85) 0%,
        rgba(10,60,180,.4)  30%,
        rgba(180,60,0,.35)  65%,
        rgba(32,160,255,.65) 100%
      );
      box-shadow:
        0 0 35px rgba(32,160,255,.45),
        0 0 90px rgba(32,160,255,.15),
        0 0 180px rgba(32,160,255,.05);
      animation: cardGlow 5s ease-in-out infinite alternate, cardReveal .9s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardGlow {
      0%  { box-shadow:0 0 28px rgba(32,160,255,.38), 0 0 70px rgba(32,160,255,.1); }
      100%{ box-shadow:0 0 55px rgba(32,160,255,.75), 0 0 130px rgba(32,160,255,.22), 0 0 220px rgba(32,160,255,.07); }
    }
    @keyframes cardReveal {
      from { opacity:0; transform:translateY(36px) scale(.94); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }

    /* Corner decorations */
    .corner { position:absolute; width:22px; height:22px; pointer-events:none; }
    .corner--tl { top:8px;  left:8px; }
    .corner--tr { top:8px;  right:8px;  transform:scaleX(-1); }
    .corner--bl { bottom:8px; left:8px;  transform:scaleY(-1); }
    .corner--br { bottom:8px; right:8px; transform:scale(-1,-1); }
    .corner svg line { stroke:rgba(32,160,255,.45); stroke-width:1.5; }

    .card__inner {
      border-radius:calc(var(--r) - 2px);
      background:linear-gradient(180deg, rgba(10,18,42,.99) 0%, rgba(5,10,24,.99) 100%);
      overflow:hidden;
    }

    /* ── HERO STRIP ── */
    .hero {
      position:relative; height:210px; overflow:hidden;
      border-radius:calc(var(--r) - 2px) calc(var(--r) - 2px) 0 0;
    }
    .hero__bg {
      width:100%; height:100%;
      object-fit:cover; object-position:center 28%;
      display:block;
      animation: heroZoom 18s ease-in-out infinite alternate;
    }
    @keyframes heroZoom { 0%{transform:scale(1)} 100%{transform:scale(1.06)} }
    .hero::after {
      content:'';
      position:absolute; inset:0;
      background:linear-gradient(to bottom,
        rgba(10,18,42,0) 0%,
        rgba(10,18,42,0) 35%,
        rgba(10,18,42,.75) 75%,
        rgba(10,18,42,.99) 100%
      );
    }
    /* Crest medallion floating over hero */
    .hero__medallion {
      position:absolute; bottom:-32px; left:50%; transform:translateX(-50%);
      width:88px; height:88px;
      border-radius:50%;
      background:#040810;
      border:2.5px solid rgba(32,160,255,.55);
      box-shadow:0 0 22px rgba(32,160,255,.55), 0 0 60px rgba(32,160,255,.18);
      overflow:hidden; z-index:2;
      animation:medallionGlow 4s ease-in-out infinite alternate;
    }
    @keyframes medallionGlow {
      0%  { box-shadow:0 0 18px rgba(32,160,255,.4),  0 0 50px rgba(32,160,255,.12); }
      100%{ box-shadow:0 0 32px rgba(32,160,255,.75), 0 0 90px rgba(32,160,255,.25); }
    }
    .hero__medallion img { width:100%; height:100%; object-fit:cover; filter:brightness(1.1) contrast(1.08); }

    /* ── BODY ── */
    .body { padding: 50px 32px 0; }

    .card-title { text-align:center; margin-bottom:4px; }
    .card-title__main {
      display:block; font-family:var(--font-d);
      font-size:23px; font-weight:900; letter-spacing:.12em;
      color:var(--col-blue-b);
      text-shadow:0 0 14px rgba(32,160,255,.6), 0 0 40px rgba(32,160,255,.25);
      animation:titlePulse 3.5s ease-in-out infinite alternate;
    }
    @keyframes titlePulse {
      0%  { text-shadow:0 0 10px rgba(32,160,255,.5),  0 0 30px rgba(32,160,255,.18); }
      100%{ text-shadow:0 0 22px rgba(94,200,255,.85), 0 0 65px rgba(32,160,255,.32); }
    }
    .card-title__sub {
      display:block; font-family:var(--font-t);
      font-size:9.5px; letter-spacing:.38em;
      color:var(--col-dim); margin-top:4px; text-transform:uppercase;
    }

    /* Rune divider */
    .divider {
      display:flex; align-items:center; gap:10px;
      margin:18px 0 20px;
    }
    .divider::before, .divider::after {
      content:''; flex:1; height:1px;
      background:linear-gradient(to right, transparent, rgba(32,160,255,.35), transparent);
    }
    .divider__rune { font-size:13px; color:rgba(32,160,255,.5); letter-spacing:.2em; font-family:var(--font-t); }

    /* ── FORM ── */
    .form { display:flex; flex-direction:column; gap:11px; }

    .field-label {
      display:block; font-family:var(--font-t);
      font-size:9px; letter-spacing:.2em;
      color:var(--col-dim); text-transform:uppercase; margin-bottom:5px;
    }
    .field-input {
      width:100%; height:46px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(32,160,255,.28);
      border-radius:9px; padding:0 14px;
      font-size:14px; color:var(--col-text); outline:none;
      transition:border-color var(--t), box-shadow var(--t), background var(--t);
    }
    .field-input::placeholder { color:rgba(180,200,220,.28); }
    .field-input:focus {
      border-color:var(--col-blue);
      background:rgba(32,160,255,.055);
      box-shadow:0 0 0 3px rgba(32,160,255,.12), 0 0 16px rgba(32,160,255,.1);
    }
    .field-hint {
      display:block; font-size:11px; color:var(--col-blue);
      margin-top:4px; cursor:pointer; font-family:var(--font-t);
      transition:color var(--t);
    }
    .field-hint:hover { color:var(--col-blue-b); }

    /* ── ENTER BUTTON ── */
    .btn-enter {
      width:100%; height:48px; margin-top:4px;
      background:linear-gradient(135deg, #1a6ed8 0%, #1e90f0 50%, #0d5cbf 100%);
      border-radius:9px;
      font-family:var(--font-t); font-size:12.5px; font-weight:700;
      letter-spacing:.22em; color:#fff; text-transform:uppercase;
      position:relative; overflow:hidden;
      transition:transform var(--t), box-shadow var(--t);
      box-shadow:0 4px 22px rgba(26,110,216,.45), 0 0 45px rgba(26,110,216,.15);
    }
    .btn-enter::before {
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,.18) 0%, transparent 55%);
      opacity:0; transition:opacity var(--t);
    }
    .btn-enter:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(26,110,216,.65), 0 0 70px rgba(26,110,216,.22); }
    .btn-enter:hover::before { opacity:1; }
    .btn-enter:active { transform:translateY(0); }
    .btn-enter:disabled { opacity:.55; cursor:not-allowed; transform:none; }

    /* ── LEGAL ── */
    .legal { font-size:10px; color:var(--col-dim); text-align:center; line-height:1.65; margin-top:10px; font-style:italic; }

    /* ── OR ROW ── */
    .or-row { display:flex; align-items:center; gap:12px; margin:16px 0; }
    .or-row__line { flex:1; height:1px; background:rgba(32,160,255,.1); }
    .or-row__lbl { font-family:var(--font-t); font-size:9.5px; letter-spacing:.2em; color:rgba(180,200,220,.28); }

    /* ── SOCIAL GRID ── */
    .social-row { display:grid; gap:7px; margin-bottom:7px; }
    .social-row--3 { grid-template-columns:repeat(3,1fr); }
    .social-row--4 { grid-template-columns:repeat(4,1fr); }

    .s-btn {
      height:42px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      border-radius:8px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer;
      transition:background var(--t), border-color var(--t), transform var(--t), box-shadow var(--t);
    }
    .s-btn:hover { background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.18); transform:translateY(-2px); }
    .s-btn:active { transform:translateY(0); }
    .s-btn svg { width:20px; height:20px; display:block; }
    .s-btn--google:hover  { border-color:rgba(234,67,53,.5);   box-shadow:0 4px 14px rgba(234,67,53,.15); }
    .s-btn--discord:hover { border-color:rgba(88,101,242,.5);  box-shadow:0 4px 14px rgba(88,101,242,.15); }
    .s-btn--apple:hover   { border-color:rgba(255,255,255,.3); box-shadow:0 4px 14px rgba(255,255,255,.07); }
    .s-btn--xbox:hover    { border-color:rgba(16,124,16,.5);   box-shadow:0 4px 14px rgba(16,124,16,.15);  background:rgba(16,124,16,.15); }
    .s-btn--ps:hover      { border-color:rgba(0,113,197,.5);   box-shadow:0 4px 14px rgba(0,113,197,.15);  background:rgba(0,113,197,.15); }
    .s-btn--nintendo:hover{ border-color:rgba(230,0,18,.5);    box-shadow:0 4px 14px rgba(230,0,18,.15);   background:rgba(230,0,18,.15); }
    .s-btn--steam:hover   { border-color:rgba(190,190,190,.3); box-shadow:0 4px 14px rgba(190,190,190,.09); }

    /* ── FOOTER ── */
    .card-footer {
      padding:18px 32px 22px;
      border-top:1px solid rgba(32,160,255,.1);
      text-align:center;
      margin-top:18px;
    }
    .card-footer__brand { font-family:var(--font-t); font-size:11px; letter-spacing:.18em; color:rgba(180,200,220,.32); text-transform:uppercase; }
    .card-footer__brand strong { color:rgba(32,160,255,.52); font-weight:600; }
    .card-footer__vla { font-family:var(--font-b); font-size:10px; font-style:italic; color:rgba(180,200,220,.18); margin-top:3px; }

    /* ══════════════════════════════════════════
       CINEMATIC TRANSITION OVERLAY
    ══════════════════════════════════════════ */
    #transitionOverlay {
      position:fixed; inset:0; z-index:9999;
      background:#000;
      opacity:0; pointer-events:none;
      transition:opacity .9s ease;
    }
    #transitionOverlay.fade-out { opacity:1; pointer-events:all; }

    /* ══════════════════════════════════════════
       MUSIC CONTROLS (top-right HUD)
    ══════════════════════════════════════════ */
    #musicHud {
      position:fixed; top:16px; right:16px; z-index:200;
      display:flex; align-items:center; gap:8px;
      opacity:0; pointer-events:none;
      transition:opacity .5s ease;
    }
    #musicHud.visible { opacity:1; pointer-events:all; }
    .music-btn {
      width:36px; height:36px; border-radius:8px;
      background:rgba(10,18,40,.9);
      border:1px solid rgba(32,160,255,.35);
      color:rgba(94,200,255,.8); font-size:16px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:background var(--t), border-color var(--t);
    }
    .music-btn:hover { background:rgba(32,160,255,.15); border-color:rgba(32,160,255,.6); }
    .vol-slider {
      -webkit-appearance:none; appearance:none;
      width:80px; height:4px;
      background:rgba(255,255,255,.12); border-radius:2px; outline:none;
      cursor:pointer;
    }
    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance:none; width:12px; height:12px; border-radius:50%;
      background:var(--col-blue); cursor:pointer;
      box-shadow:0 0 6px rgba(32,160,255,.6);
    }

    /* ══════════════════════════════════════════
       PARTICLES
    ══════════════════════════════════════════ */
    .spark { position:fixed; border-radius:50%; pointer-events:none; }

    /* TOAST */
    .toast {
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
      background:rgba(10,18,40,.97); border:1px solid rgba(32,160,255,.4);
      border-radius:20px; padding:8px 20px;
      font-family:var(--font-t); font-size:11px; letter-spacing:.1em;
      color:rgba(94,200,255,.9); white-space:nowrap;
      box-shadow:0 4px 20px rgba(0,0,0,.7); z-index:8000;
      animation:toastIn .3s ease, toastOut .3s ease 2.2s forwards;
    }
    @keyframes toastIn  { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    @keyframes toastOut { from{opacity:1} to{opacity:0;transform:translateX(-50%) translateY(-6px)} }
  </style>
</head>
<body>

  <!-- CINEMATIC FADE OVERLAY -->
  <div id="transitionOverlay"></div>

  <!-- MUSIC HUD -->
  <div id="musicHud" aria-label="Music controls">
    <button class="music-btn" id="muteBtn" title="Mute / Unmute">🔊</button>
    <input class="vol-slider" id="volSlider" type="range" min="0" max="100" value="70" aria-label="Volume" />
  </div>

  <!-- AUDIO — jwkbgmusic.mp3 — NOT autoplay, triggered by Enter button -->
  <!-- // future audio hook: swap src for dynamic track selection per zone -->
  <audio id="bgMusic" loop preload="auto">
    <source src="../audio/jwkbgmusic.mp3" type="audio/mpeg" />
  </audio>

  <!-- BACKGROUND LAYERS -->
  <div class="bg" aria-hidden="true">
    <div class="bg-crest"></div>
    <div class="bg-stars"></div>
    <div class="bg-stars-2"></div>
    <div class="bg-nebula"></div>
    <div class="bg-lava"></div>
    <div class="bg-vignette"></div>
  </div>

  <!-- PAGE -->
  <main class="page">
    <div class="card" id="loginCard">

      <!-- Corner runes -->
      <div class="corner corner--tl" aria-hidden="true"><svg viewBox="0 0 22 22"><line x1="2" y1="20" x2="2" y2="2"/><line x1="2" y1="2" x2="20" y2="2"/></svg></div>
      <div class="corner corner--tr" aria-hidden="true"><svg viewBox="0 0 22 22"><line x1="2" y1="20" x2="2" y2="2"/><line x1="2" y1="2" x2="20" y2="2"/></svg></div>
      <div class="corner corner--bl" aria-hidden="true"><svg viewBox="0 0 22 22"><line x1="2" y1="20" x2="2" y2="2"/><line x1="2" y1="2" x2="20" y2="2"/></svg></div>
      <div class="corner corner--br" aria-hidden="true"><svg viewBox="0 0 22 22"><line x1="2" y1="20" x2="2" y2="2"/><line x1="2" y1="2" x2="20" y2="2"/></svg></div>

      <div class="card__inner">

        <!-- HERO: jaglotl_card_bg.png -->
        <div class="hero">
          <img class="hero__bg" src="jaglotl_card_bg.png" alt="Jaglotl Kingdom crest" />
          <!-- Medallion: jaglotl_logo_black.jpg -->
          <div class="hero__medallion">
            <img src="jaglotl_logo_black.jpg" alt="JAGLOTL emblem" />
          </div>
        </div>

        <!-- BODY -->
        <div class="body">

          <div class="card-title">
            <span class="card-title__main">JAGLOTL</span>
            <span class="card-title__sub">Warcraft Kingdom · Tore Portal</span>
          </div>

          <div class="divider"><span class="divider__rune">ᚦ &nbsp; ᚢ &nbsp; ᚷ</span></div>

          <form class="form" id="loginForm" novalidate>
            <div>
              <label class="field-label" for="emailField">Tore Access Code / Email</label>
              <input class="field-input" id="emailField" type="email"
                placeholder="commander@realm.jaglotl"
                autocomplete="email" spellcheck="false" />
              <span class="field-hint" role="button" tabindex="0">Forgot access code?</span>
            </div>

            <!-- MAIN CTA — triggers music + transition -->

  <script>
    'use strict';
    /* ═══════════════════════════════════════════════════════
       JAGLOTL LOGIN — 06_ASSETS/branding/index.html
       Dependencies:
         ../audio/jwkbgmusic.mp3
         jaglotl_card_bg.png
         jaglotl_logo_black.jpg
         jwkBG.png  (used as bg-crest wash)
         → ../../01_FRONTEND/home_tore_screen/index.html

       // future backend hook: POST /api/auth/tore-login
       // future audio hook: dynamic track per world zone
       // future save logic: store session token on success
    ═══════════════════════════════════════════════════════ */

    /* ── AUDIO ENGINE ── */
    const bgMusic   = document.getElementById('bgMusic');
    const muteBtn   = document.getElementById('muteBtn');
    const volSlider = document.getElementById('volSlider');
    const musicHud  = document.getElementById('musicHud');

    // Volume config — tweak this variable
    // // future audio hook: load user volume preference from saved profile
    let VOLUME = 0.70;
    bgMusic.volume = VOLUME;

    let musicStarted = false;
    let isMuted = false;

    function startMusic() {
      if (musicStarted) return;
      musicStarted = true;
      bgMusic.volume = 0;
      bgMusic.play().then(() => {
        // Fade in over 2.5s
        let v = 0;
        const step = VOLUME / 50;
        const fade = setInterval(() => {
          v = Math.min(VOLUME, v + step);
          bgMusic.volume = v;
          if (v >= VOLUME) clearInterval(fade);
        }, 50);
        musicHud.classList.add('visible');
      }).catch(() => {
        // Autoplay blocked — silently ignore, HUD stays hidden
        musicStarted = false;
      });
    }

    muteBtn.addEventListener('click', () => {
      isMuted = !isMuted;
      bgMusic.muted = isMuted;
      muteBtn.textContent = isMuted ? '🔇' : '🔊';
    });

    volSlider.addEventListener('input', () => {
      VOLUME = volSlider.value / 100;
      bgMusic.volume = VOLUME;
      if (VOLUME === 0) { bgMusic.muted = true; muteBtn.textContent = '🔇'; isMuted = true; }
      else if (isMuted) { bgMusic.muted = false; muteBtn.textContent = '🔊'; isMuted = false; }
    });

    /* ── TRANSITION OVERLAY ── */
    const overlay = document.getElementById('transitionOverlay');

    function doTransition(destination) {
      overlay.classList.add('fade-out');
      setTimeout(() => {
        window.location.href = destination;
      }, 950);
    }

    /* ── FORM ── */
    const form      = document.getElementById('loginForm');
    const emailFld  = document.getElementById('emailField');
    const enterBtn  = document.getElementById('enterBtn');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = emailFld.value.trim();

      if (!email) {
        emailFld.style.borderColor = 'rgba(231,76,60,.7)';
        emailFld.style.boxShadow   = '0 0 0 3px rgba(231,76,60,.12)';
        emailFld.focus();
        return;
      }

      // 1. Start music immediately on user gesture
      startMusic();

      // 2. Button loading state
      enterBtn.disabled = true;
      enterBtn.textContent = 'Channeling the Void...';

      // future backend hook: POST /api/auth/tore-login { email }

      // 3. After 1.4s — show success state
      setTimeout(() => {
        enterBtn.textContent = '✦  Tore Gate Opening...';
        enterBtn.style.background = 'linear-gradient(135deg,#0a6040,#16a070)';

        // 4. After another 1.2s — cinematic fade → navigate
        setTimeout(() => {
          doTransition('../../01_FRONTEND/home_tore_screen/index.html');
        }, 1200);
      }, 1400);
    });

    emailFld.addEventListener('input', () => {
      emailFld.style.borderColor = '';
      emailFld.style.boxShadow   = '';
    });

    /* ── SOCIAL BUTTONS ── */
    document.querySelectorAll('.s-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        // future backend hook: OAuth per platform
        showToast(`${btn.title} — Phase 2 feature`);
      });
    });

    /* ── AMBIENT PARTICLES ── */
    const COLORS = ['#5ec8ff','#20a0ff','rgba(201,162,39,.8)','rgba(255,106,0,.65)','rgba(94,200,255,.5)'];
    for (let i = 0; i < 22; i++) {
      const s   = document.createElement('div');
      s.className = 'spark';
      const sz  = Math.random() * 2.5 + 0.8;
      const dur = Math.random() * 14 + 8;
      const x   = Math.random() * 100;
      const del = Math.random() * -22;
      s.style.cssText = `
        left:${x}vw; bottom:-4px;
        width:${sz}px; height:${sz}px;
        background:${COLORS[Math.floor(Math.random()*COLORS.length)]};
        opacity:${Math.random() * .55 + .2};
        animation:sparkUp ${dur}s linear ${del}s infinite;
      `;
      document.body.appendChild(s);
    }

    /* ── TOAST UTIL ── */
    function showToast(msg) {
      const el = document.createElement('div');
      el.className = 'toast';
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2700);
    }

    /* ── INJECTED KEYFRAMES ── */
    const kf = document.createElement('style');
    kf.textContent = `
      @keyframes sparkUp {
        0%   { transform:translateY(0); opacity:0; }
        8%   { opacity:1; }
        88%  { opacity:.5; }
        100% { transform:translateY(-102vh) translateX(${(Math.random()-.5)*60}px); opacity:0; }
      }
    `;
    document.head.appendChild(kf);
  </script>
