<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>VAXINX Tore Login | JAGLOTL KINGDOM</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700;900&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#07090d;
overflow:hidden;
font-family:'Cinzel',serif;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

body::before{
content:"";
position:absolute;
inset:0;

background:
linear-gradient(
rgba(0,0,0,.55),
rgba(0,0,0,.82)
),

url("jwkBG.png");

background-size:cover;
background-position:center;

filter:blur(2px);

transform:scale(1.05);

z-index:-2;
}

body::after{
content:"";
position:absolute;
inset:0;

background:
radial-gradient(
circle at center,
rgba(32,160,255,.12),
transparent 70%
);

z-index:-1;
}

.card{

width:420px;

padding:32px;

border-radius:28px;

background:
rgba(10,14,22,.72);

backdrop-filter:blur(12px);

border:

2px solid
rgba(32,160,255,.35);

box-shadow:

0 0 20px rgba(32,160,255,.30),

0 0 60px rgba(32,160,255,.18);

text-align:center;

animation:
floatCard 4s ease-in-out infinite;
}

@keyframes floatCard{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-8px);
}

}

.logo{

width:120px;

margin:auto;

display:block;

filter:
drop-shadow(
0 0 20px
rgba(32,160,255,.55)
);

}

.hero{

width:100%;

margin-top:18px;

border-radius:18px;

border:

1px solid
rgba(255,255,255,.15);

}

h1{

margin-top:20px;

font-family:
'Cinzel Decorative',
serif;

font-size:34px;

color:#20a0ff;

text-shadow:
0 0 20px
rgba(32,160,255,.5);

}

.subtitle{

margin-top:10px;

font-size:14px;

opacity:.85;

font-family:
'Crimson Pro',
serif;

}

.input{

margin-top:24px;

width:100%;

padding:14px;

border-radius:14px;

border:none;

outline:none;

background:
rgba(255,255,255,.08);

color:white;

}

.enter{

margin-top:24px;

width:100%;

padding:15px;

border:none;

border-radius:16px;

cursor:pointer;

font-weight:700;

background:

linear-gradient(
90deg,
#1b7dff,
#20a0ff
);

color:white;

transition:.3s;
}

.enter:hover{

transform:scale(1.03);

box-shadow:
0 0 25px
rgba(32,160,255,.6);

}

.musicHUD{

margin-top:18px;

display:flex;

gap:10px;

justify-content:center;

align-items:center;

}

.musicBtn{

padding:8px 14px;

border:none;

border-radius:12px;

cursor:pointer;

background:
rgba(32,160,255,.18);

color:white;

}

.fadeGate{

position:fixed;

inset:0;

background:black;

opacity:0;

pointer-events:none;

transition:.9s;

}

.fadeGate.active{

opacity:1;

pointer-events:auto;

}

.footer{

margin-top:20px;

font-size:12px;

opacity:.65;

}

</style>

</head>

<body>

<div class="card">

<img
src="jaglotl_logo_black.jpg"
class="logo"
alt="logo">

<img
src="jaglotl_card_bg.png"
class="hero"
alt="hero">

<h1>
ENTER THE TORE
</h1>

<p class="subtitle">

Build your kingdom.
Command your Legion.
Rule the Void.

</p>

<input
class="input"
placeholder="Access Rune">

<button
class="enter">

⚔ ENTER THE TORE

</button>

<div class="musicHUD">

<button
class="musicBtn"
id="toggleMusic">

🎵 Music

</button>

</div>

<div class="footer">

VAXINX • JAGLOTL KINGDOM

</div>

</div>

<div class="fadeGate"
id="fadeGate"></div>

<audio
id="bgMusic"
loop>

<source
src="../audio/jwkbgmusic.mp3"
type="audio/mpeg">

</audio>

<script>

const btn=
document.querySelector(
".enter"
);

const music=
document.getElementById(
"bgMusic"
);

const gate=
document.getElementById(
"fadeGate"
);

const toggle=
document.getElementById(
"toggleMusic"
);

toggle.onclick=()=>{

if(music.paused){

music.play();

}else{

music.pause();

}

};

btn.onclick=()=>{

music.volume=.7;

music.play()
.catch(()=>{});

btn.innerText=
"🌌 Channeling the Void...";

gate.classList.add(
"active"
);

setTimeout(()=>{

window.location.href=

"../../01_FRONTEND/home_tore_screen/index.html";

},900);

};

</script>

</body>
</html>
